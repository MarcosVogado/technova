{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova OS // {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom border-info mb-4" style="background: var(--panel-dark);">
        <div class="container">
            <a class="navbar-brand neon-title fw-bold" href="{% url 'home' %}">
                <i class="bi bi-cpu"></i> TECHNOVA_OS
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-info px-3" href="{% url 'home' %}">DASHBOARD</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info px-3" href="{% url 'listar_produtos' %}">PRODUTOS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info px-3" href="{% url 'nova_venda' %}">NOVA_VENDA</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-info px-3" href="{% url 'lista_vendas' %}">HISTÓRICO</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-warning px-3" href="/admin">ADMIN</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-info{% else %}alert-danger{% endif %} glass-panel mb-4" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'core/js/main.js' %}"></script>
</body>
</html>
