{% extends 'core/base.html' %}

{% block title %}HISTORICO_VENDAS{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-6"><h2 class="neon-title">Histórico_de_Transações</h2></div>
    <div class="col-md-6 text-end">
        <a href="{% url 'nova_venda' %}" class="btn btn-info btn-sm fw-bold">NOVA_VENDA +</a>
    </div>
</div>

<div class="glass-panel p-4">
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr class="text-info">
                    <th>ID</th>
                    <th>DATA</th>
                    <th>CLIENTE</th>
                    <th>VENDEDOR</th>
                    <th>TOTAL</th>
                    <th class="text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="tabelaVendas">
                <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal de detalhes -->
<div class="modal fade" id="modalDetalhes" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content glass-panel text-white">
            <div class="modal-header border-info">
                <h5 class="modal-title neon-title" id="detalhesTitulo">Detalhes</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detalhesCorpo"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let VENDAS = [];

function abrirDetalhes(id) {
    const v = VENDAS.find(x => x.id === id);
    if (!v) return;
    document.getElementById('detalhesTitulo').textContent = `Venda #${v.id}`;
    const itens = v.itens.map(i => `
        <tr>
            <td>${esc(i.produto_nome)}</td>
            <td class="text-center">${i.quantidade}</td>
            <td class="text-end">R$ ${i.preco_unitario}</td>
            <td class="text-end text-info">R$ ${i.subtotal}</td>
        </tr>`).join('');
    document.getElementById('detalhesCorpo').innerHTML = `
        <p class="mb-1"><span class="text-muted">Cliente:</span> ${esc(v.cliente_nome)}</p>
        <p class="mb-1"><span class="text-muted">Vendedor:</span> ${esc(v.usuario_nome)}</p>
        ${v.observacoes ? `<p class="mb-3"><span class="text-muted">Obs.:</span> ${esc(v.observacoes)}</p>` : ''}
        <table class="table table-dark table-sm mt-2">
            <thead><tr class="text-info"><th>Produto</th><th class="text-center">Qtd</th><th class="text-end">Unit.</th><th class="text-end">Subtotal</th></tr></thead>
            <tbody>${itens}</tbody>
        </table>
        <h5 class="text-end text-info mt-3">TOTAL: R$ ${v.valor_total}</h5>`;
    new bootstrap.Modal(document.getElementById('modalDetalhes')).show();
}

(async function carregar() {
    try {
        VENDAS = await TechNovaAPI.getJSON('/api/vendas/');
        const tbody = document.getElementById('tabelaVendas');
        tbody.innerHTML = VENDAS.length ? VENDAS.map(v => `
            <tr>
                <td>#${v.id}</td>
                <td>${new Date(v.data_venda).toLocaleString('pt-BR')}</td>
                <td>${esc(v.cliente_nome)}</td>
                <td>${esc(v.usuario_nome)}</td>
                <td class="text-success">R$ ${v.valor_total}</td>
                <td class="text-center"><button class="btn btn-sm btn-outline-info" onclick="abrirDetalhes(${v.id})">Detalhes</button></td>
            </tr>`).join('')
            : '<tr><td colspan="6" class="text-center text-muted py-4">Nenhuma venda registrada ainda.</td></tr>';
    } catch (e) {
        flash('Falha ao carregar o histórico: ' + e.message, 'danger');
    }
})();
</script>
{% endblock %}
