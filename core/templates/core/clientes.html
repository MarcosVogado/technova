{% extends 'core/base.html' %}

{% block title %}CLIENTES_SISTEMA{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-6"><h2 class="neon-title">Base_de_Clientes</h2></div>
    <div class="col-md-6 text-end">
        <button class="btn btn-outline-info btn-sm" onclick="abrirForm()">NOVO_CLIENTE +</button>
    </div>
</div>

<div class="glass-panel p-4">
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr class="text-info">
                    <th>ID</th><th>NOME</th><th>CPF</th><th>E-MAIL</th>
                    <th>TELEFONE</th><th class="text-center">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes">
                <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal de cadastro/edição -->
<div class="modal fade" id="modalCliente" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content glass-panel text-white">
            <div class="modal-header border-info">
                <h5 class="modal-title neon-title" id="clienteTitulo">Novo Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formCliente" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="clienteId">
                    <div id="formErro" class="alert alert-danger d-none"></div>
                    <div class="mb-3">
                        <label class="text-info small fw-bold">NOME *</label>
                        <input id="c_nome" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="text-info small fw-bold">CPF *</label>
                            <input id="c_cpf" class="form-control bg-dark text-white border-secondary" placeholder="000.000.000-00" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="text-info small fw-bold">TELEFONE</label>
                            <input id="c_telefone" class="form-control bg-dark text-white border-secondary" placeholder="(00) 00000-0000" maxlength="15" inputmode="numeric">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="text-info small fw-bold">E-MAIL *</label>
                        <input id="c_email" type="email" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="text-info small fw-bold">ENDEREÇO</label>
                        <textarea id="c_endereco" rows="2" class="form-control bg-dark text-white border-secondary"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-info fw-bold">SALVAR</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let CLIENTES = [];
let modalCliente;

function render() {
    const tbody = document.getElementById('tabelaClientes');
    tbody.innerHTML = CLIENTES.length ? CLIENTES.map(c => `
        <tr>
            <td class="text-muted">#${c.id}</td>
            <td class="fw-bold">${esc(c.nome)}</td>
            <td>${esc(c.cpf)}</td>
            <td>${esc(c.email)}</td>
            <td>${esc(c.telefone || '-')}</td>
            <td class="text-center">
                <button class="btn btn-sm btn-outline-info" onclick="abrirForm(${c.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="excluir(${c.id})"><i class="bi bi-trash"></i></button>
            </td>
        </tr>`).join('')
        : '<tr><td colspan="6" class="text-center text-muted py-4">Nenhum cliente cadastrado.</td></tr>';
}

function abrirForm(id) {
    document.getElementById('formCliente').reset();
    document.getElementById('formErro').classList.add('d-none');
    document.getElementById('clienteId').value = id || '';
    document.getElementById('clienteTitulo').textContent = id ? 'Editar Cliente' : 'Novo Cliente';
    if (id) {
        const c = CLIENTES.find(x => x.id === id);
        document.getElementById('c_nome').value = c.nome;
        document.getElementById('c_cpf').value = c.cpf;
        document.getElementById('c_telefone').value = mascaraTelefone(c.telefone || '');
        document.getElementById('c_email').value = c.email;
        document.getElementById('c_endereco').value = c.endereco || '';
    }
    modalCliente.show();
}

async function excluir(id) {
    if (!confirm('Confirma a exclusão deste cliente?')) return;
    try {
        await TechNovaAPI.del(`/api/clientes/${id}/`);
        flash('Cliente excluído.', 'info');
        await carregar();
    } catch (e) { flash(e.message, 'danger'); }
}

function mascaraTelefone(v) {
    v = v.replace(/\D/g, '').slice(0, 11);
    if (v.length > 10) return v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
    if (v.length > 6)  return v.replace(/^(\d{2})(\d{4})(\d*)$/, '($1) $2-$3');
    if (v.length > 2)  return v.replace(/^(\d{2})(\d*)$/, '($1) $2');
    return v.length ? '(' + v : v;
}

document.getElementById('c_telefone').addEventListener('input', function () {
    this.value = mascaraTelefone(this.value);
});

document.getElementById('formCliente').addEventListener('submit', async (e) => {
    e.preventDefault();
    const erro = document.getElementById('formErro');
    erro.classList.add('d-none');
    const id = document.getElementById('clienteId').value;
    const payload = {
        nome: document.getElementById('c_nome').value.trim(),
        cpf: document.getElementById('c_cpf').value.trim(),
        email: document.getElementById('c_email').value.trim(),
        telefone: document.getElementById('c_telefone').value.trim(),
        endereco: document.getElementById('c_endereco').value.trim(),
    };
    try {
        if (id) await TechNovaAPI.put(`/api/clientes/${id}/`, payload);
        else await TechNovaAPI.post('/api/clientes/', payload);
        modalCliente.hide();
        flash('Cliente salvo com sucesso.', 'info');
        await carregar();
    } catch (err) {
        erro.textContent = err.message;
        erro.classList.remove('d-none');
    }
});

async function carregar() {
    try {
        CLIENTES = await TechNovaAPI.getJSON('/api/clientes/');
        render();
    } catch (e) { flash('Falha ao carregar clientes: ' + e.message, 'danger'); }
}

document.addEventListener('DOMContentLoaded', () => {
    modalCliente = new bootstrap.Modal(document.getElementById('modalCliente'));
    carregar();
});
</script>
{% endblock %}
