{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova OS // LOGIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>
<body>
    <div class="container" style="max-width: 430px; margin-top: 12vh;">
        <div class="glass-panel p-5">
            <h2 class="neon-title text-center mb-2"><i class="bi bi-cpu"></i> TECHNOVA_OS</h2>
            <p class="text-center text-muted small mb-4">ACESSO_RESTRITO // AUTENTICAÇÃO JWT</p>

            <div id="erro" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="text-info small fw-bold">USUÁRIO</label>
                    <input id="username" class="form-control bg-dark text-white border-secondary" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="text-info small fw-bold">SENHA</label>
                    <input id="password" type="password" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-info fw-bold py-2" type="submit">
                        ACESSAR_SISTEMA <i class="bi bi-box-arrow-in-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{% static 'core/js/api.js' %}"></script>
    <script>
        // Se já houver sessão ativa, vai direto ao dashboard.
        if (TechNovaAPI.getAccess()) window.location.href = '/';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const erro = document.getElementById('erro');
            const btn = e.target.querySelector('button');
            erro.classList.add('d-none');
            btn.disabled = true;
            try {
                await TechNovaAPI.login(
                    document.getElementById('username').value.trim(),
                    document.getElementById('password').value
                );
                window.location.href = '/';
            } catch (err) {
                erro.textContent = err.message;
                erro.classList.remove('d-none');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
